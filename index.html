<html>
    <head>
        <style>
            .embedDiv {
                width: 410px;
                height: 460px;
                animation: movement 3s ease-in-out infinite alternate;
            }
            @keyframes movement {
                0% {
                    transform: translateX(0);
                    transform: translateY(0);
                }
                100% {
                    transform: translateX(calc(100vw - 410px))
                    transform: translateY(calc(100vh - 460px))
                }
            }
        </style>
    </head>
    <body>
        <h1 style="display: flex; justify-content: center;">My name is MICHAEL!!!!!</h1>
        <p style="display: flex; justify-content: center;">
            this is my goon website
        </p>

            <iframe width="410" height="460"
   src="https://academy.cs.cmu.edu/sharing/azureCrocodile522173/embed"> 
 </iframe>
        </div>
        
    </body>
</html>
